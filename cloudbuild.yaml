steps:
  # ==========================================
  # 1. Build Backend Image
  # ==========================================
  - name: 'gcr.io/cloud-builders/docker'
    id: 'Build Backend'
    args: [
      'build', 
      '-t', '$_REGION-docker.pkg.dev/$PROJECT_ID/$_REPOSITORY/fractal-backend:$BUILD_ID',
      '-t', '$_REGION-docker.pkg.dev/$PROJECT_ID/$_REPOSITORY/fractal-backend:latest',
      '.'
    ]

  # ==========================================
  # 2. Build Frontend Image
  # ==========================================
  - name: 'gcr.io/cloud-builders/docker'
    id: 'Build Frontend'
    args: [
      'build',
      '-t', '$_REGION-docker.pkg.dev/$PROJECT_ID/$_REPOSITORY/fractal-frontend:$BUILD_ID',
      '-t', '$_REGION-docker.pkg.dev/$PROJECT_ID/$_REPOSITORY/fractal-frontend:latest',
      '--build-arg', 'VITE_API_URL=/api',
      '--build-arg', 'VITE_LANDING_EXAMPLES_STATIC_URL=https://storage.googleapis.com/$PROJECT_ID-landing-public-$PROJECT_NUMBER/landing-examples.json',
      'client'
    ]

  # ==========================================
  # 3. Push Images to Artifact Registry
  # ==========================================
  - name: 'gcr.io/cloud-builders/docker'
    id: 'Push Images'
    args: [
      'push', 
      '--all-tags', 
      '$_REGION-docker.pkg.dev/$PROJECT_ID/$_REPOSITORY/fractal-backend'
    ]
  - name: 'gcr.io/cloud-builders/docker'
    id: 'Push Frontend'
    args: [
      'push', 
      '--all-tags', 
      '$_REGION-docker.pkg.dev/$PROJECT_ID/$_REPOSITORY/fractal-frontend'
    ]

  # ==========================================
  # 4. Run DB Migrations (Cloud Run Job)
  # ==========================================
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'Update Migration Job'
    entrypoint: gcloud
    args: [
      'run', 'jobs', 'update', 'migrate-db',
      '--image', '$_REGION-docker.pkg.dev/$PROJECT_ID/$_REPOSITORY/fractal-backend:$BUILD_ID',
      '--region', '$_REGION',
      '--set-secrets', 'SUPABASE_DIRECT_DATABASE_URL=SUPABASE_DIRECT_DATABASE_URL:latest',
      '--set-env-vars', 'FLASK_ENV=production',
      '--command', 'python',
      '--args', 'db_migrate.py,upgrade'
    ]
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'Run Migrations'
    entrypoint: gcloud
    args: [
      'run', 'jobs', 'execute', 'migrate-db',
      '--region', '$_REGION',
      '--wait'
    ]

  # ==========================================
  # 4b. Update Analytics Export Job
  # ==========================================
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'Update Analytics Export Job'
    entrypoint: gcloud
    args: [
      'run', 'jobs', 'update', 'export-analytics',
      '--image', '$_REGION-docker.pkg.dev/$PROJECT_ID/$_REPOSITORY/fractal-backend:$BUILD_ID',
      '--region', '$_REGION',
      '--set-secrets', 'SUPABASE_DIRECT_DATABASE_URL=SUPABASE_DIRECT_DATABASE_URL:latest',
      '--set-env-vars', 'FLASK_ENV=production,BIGQUERY_DATASET=$_BIGQUERY_DATASET',
      '--command', 'python',
      '--args', 'scripts/export_analytics_to_bigquery.py',
      '--service-account', 'fractal-runtime@fractal-goals.iam.gserviceaccount.com'
    ]

  # ==========================================
  # 5. Deploy to Cloud Run (Backend)
  # ==========================================
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'Deploy Backend'
    entrypoint: gcloud
    args: [
      'run', 'deploy', 'fractal-backend',
      '--image', '$_REGION-docker.pkg.dev/$PROJECT_ID/$_REPOSITORY/fractal-backend:$BUILD_ID',
      '--region', '$_REGION',
      '--platform', 'managed',
      '--allow-unauthenticated', # Remove if auth required
      '--set-secrets', 'SUPABASE_DATABASE_URL=SUPABASE_DATABASE_URL:latest,JWT_SECRET_KEY=JWT_SECRET_KEY:latest,RESEND_EMAIL_API_KEY=RESEND_EMAIL_API_KEY:latest,RESEND_WEBHOOK_SIGNING_SECRET=RESEND_WEBHOOK_SIGNING_SECRET:latest',
      '--set-env-vars', 'FLASK_ENV=production,FLASK_DEBUG=false,CORS_ORIGINS=https://my.fractalgoals.com;https://fractalgoals.com;https://www.fractalgoals.com;https://fractal-frontend-195572181270.us-east1.run.app,AUTH_COOKIE_SAMESITE=Strict,AUTH_COOKIE_SECURE=True,CSP_CONNECT_SRC=https://fractal-backend-195572181270.us-east1.run.app,RATELIMIT_STORAGE_URI=memory://,ALLOW_IN_MEMORY_RATELIMIT=true,WEB_CONCURRENCY=1,GUNICORN_THREADS=4,GUNICORN_TIMEOUT=210,EMAIL_PROVIDER=resend,EMAIL_FROM=Fractal Goals <support@fractalgoals.com>,APP_BASE_URL=https://my.fractalgoals.com,PUBLIC_MARKETING_URL=https://fractalgoals.com,LANDING_EXAMPLES_STATIC_GCS_BUCKET=$PROJECT_ID-landing-public-$PROJECT_NUMBER,LANDING_EXAMPLES_STATIC_GCS_BLOB=$_LANDING_EXAMPLES_STATIC_GCS_BLOB,LANDING_EXAMPLES_STATIC_UPLOAD_TIMEOUT_SECONDS=10,LANDING_EXAMPLES_MAX_UNCOMPRESSED_BYTES=2000000,LANDING_EXAMPLES_MAX_COMPRESSED_BYTES=500000',
      '--timeout', '240s',
      '--max-instances', '1',
      # Startup gates rollout on DB reachability (/api/readyz does SELECT 1);
      # liveness stays DB-free so transient DB blips do not restart the container.
      '--startup-probe', 'httpGet.path=/api/readyz,initialDelaySeconds=2,periodSeconds=5,timeoutSeconds=3,failureThreshold=12',
      '--liveness-probe', 'httpGet.path=/api/healthz,periodSeconds=30,timeoutSeconds=3,failureThreshold=3',
      '--service-account', 'fractal-runtime@fractal-goals.iam.gserviceaccount.com'
    ]

  # ==========================================
  # 6. Deploy to Cloud Run (Frontend)
  # ==========================================
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'Deploy Frontend'
    entrypoint: gcloud
    args: [
      'run', 'deploy', 'fractal-frontend',
      '--image', '$_REGION-docker.pkg.dev/$PROJECT_ID/$_REPOSITORY/fractal-frontend:$BUILD_ID',
      '--region', '$_REGION',
      '--platform', 'managed',
      '--allow-unauthenticated',
      '--set-env-vars', 'BACKEND_URL=https://fractal-backend-195572181270.us-east1.run.app',
      '--timeout', '240s',
      '--service-account', 'fractal-runtime@fractal-goals.iam.gserviceaccount.com'
    ]

# Global timeout
timeout: '1200s'

# The public bucket and URL are derived from Cloud Build's built-in PROJECT_ID
# and PROJECT_NUMBER values above, keeping every environment project-isolated.
substitutions:
  _REGION: 'us-east1'
  _REPOSITORY: 'fractal-repo' # Artifact Registry Repository Name
  _LANDING_EXAMPLES_STATIC_GCS_BLOB: 'landing-examples.json'
  _BIGQUERY_DATASET: 'fractal_analytics'

options:
  default_logs_bucket_behavior: REGIONAL_USER_OWNED_BUCKET
