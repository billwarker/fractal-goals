name: Backend CI

on:
  pull_request:
    paths:
      - "blueprints/**"
      - "services/**"
      - "models/**"
      - "tests/**"
      - "requirements*.txt"
      - "pytest.ini"
      - ".github/workflows/backend-ci.yml"
  push:
    branches: ["main"]

jobs:
  backend-unit:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      ENV: testing
      DATABASE_URL: postgresql://fractal:fractal_dev_password@localhost:5432/fractal_goals_test
      JWT_SECRET_KEY: test-secret-key
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: fractal
          POSTGRES_PASSWORD: fractal_dev_password
          POSTGRES_DB: fractal_goals
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U fractal -d fractal_goals"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-test.txt

      - name: Prepare Postgres test database
        run: |
          python - <<'PY'
          import os
          import time
          import psycopg2
          from psycopg2.extensions import ISOLATION_LEVEL_AUTOCOMMIT

          admin_url = "postgresql://fractal:fractal_dev_password@localhost:5432/postgres"
          test_db = "fractal_goals_test"
          last_error = None

          for _ in range(30):
              try:
                  conn = psycopg2.connect(admin_url)
                  conn.set_isolation_level(ISOLATION_LEVEL_AUTOCOMMIT)
                  cur = conn.cursor()
                  cur.execute("SELECT 1 FROM pg_database WHERE datname = %s", (test_db,))
                  if not cur.fetchone():
                      cur.execute(f'CREATE DATABASE "{test_db}"')
                  cur.close()
                  conn.close()
                  break
              except Exception as exc:
                  last_error = exc
                  time.sleep(1)
          else:
              raise SystemExit(f"Postgres test database was not ready: {last_error}")
          PY

      - name: Lint Syntax
        run: |
          python -m compileall blueprints services models

      - name: Run Unit Tests
        run: |
          python -m pytest tests/unit -q -o addopts="--verbose --strict-markers"

  backend-integration:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      ENV: testing
      DATABASE_URL: postgresql://fractal:fractal_dev_password@localhost:5432/fractal_goals_test
      JWT_SECRET_KEY: test-secret-key
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: fractal
          POSTGRES_PASSWORD: fractal_dev_password
          POSTGRES_DB: fractal_goals
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U fractal -d fractal_goals"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-test.txt

      - name: Prepare Postgres test database
        run: |
          python - <<'PY'
          import time
          import psycopg2
          from psycopg2.extensions import ISOLATION_LEVEL_AUTOCOMMIT

          admin_url = "postgresql://fractal:fractal_dev_password@localhost:5432/postgres"
          test_db = "fractal_goals_test"
          last_error = None

          for _ in range(30):
              try:
                  conn = psycopg2.connect(admin_url)
                  conn.set_isolation_level(ISOLATION_LEVEL_AUTOCOMMIT)
                  cur = conn.cursor()
                  cur.execute("SELECT 1 FROM pg_database WHERE datname = %s", (test_db,))
                  if not cur.fetchone():
                      cur.execute(f'CREATE DATABASE "{test_db}"')
                  cur.close()
                  conn.close()
                  break
              except Exception as exc:
                  last_error = exc
                  time.sleep(1)
          else:
              raise SystemExit(f"Postgres test database was not ready: {last_error}")
          PY

      - name: Run Integration Tests
        run: |
          python -m pytest tests/integration -q -o addopts="--verbose --strict-markers"

      - name: Run Query Budget Tests
        run: |
          python -m pytest tests/performance -q -o addopts="--verbose --strict-markers"

  coverage:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      ENV: testing
      DATABASE_URL: postgresql://fractal:fractal_dev_password@localhost:5432/fractal_goals_test
      JWT_SECRET_KEY: test-secret-key
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: fractal
          POSTGRES_PASSWORD: fractal_dev_password
          POSTGRES_DB: fractal_goals
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U fractal -d fractal_goals"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-test.txt

      - name: Prepare Postgres test database
        run: |
          python - <<'PY'
          import time
          import psycopg2
          from psycopg2.extensions import ISOLATION_LEVEL_AUTOCOMMIT

          admin_url = "postgresql://fractal:fractal_dev_password@localhost:5432/postgres"
          test_db = "fractal_goals_test"
          last_error = None

          for _ in range(30):
              try:
                  conn = psycopg2.connect(admin_url)
                  conn.set_isolation_level(ISOLATION_LEVEL_AUTOCOMMIT)
                  cur = conn.cursor()
                  cur.execute("SELECT 1 FROM pg_database WHERE datname = %s", (test_db,))
                  if not cur.fetchone():
                      cur.execute(f'CREATE DATABASE "{test_db}"')
                  cur.close()
                  conn.close()
                  break
              except Exception as exc:
                  last_error = exc
                  time.sleep(1)
          else:
              raise SystemExit(f"Postgres test database was not ready: {last_error}")
          PY

      - name: Run Coverage Suite
        run: |
          python -m pytest tests/unit tests/integration tests/performance --cov=. --cov-report=xml --cov-report=html --cov-report=term-missing -o addopts="--verbose --strict-markers"

      - name: Upload Coverage Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: |
            coverage.xml
            htmlcov/
