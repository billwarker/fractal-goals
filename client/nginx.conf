server {
    listen 8080;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header X-Frame-Options "DENY" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    # Restrict which hosts may be embedded via <iframe> (note video embeds).
    # Only frame-src is set so other resource loading is unaffected.
    # frame-src is a strict host allowlist (executable third-party frames);
    # img-src allows any https image (non-executable) so provider thumbnails
    # (YouTube i.ytimg.com, Instagram/Drive CDNs) load without a brittle host list.
    add_header Content-Security-Policy "frame-src 'self' https://www.youtube-nocookie.com https://www.youtube.com https://www.instagram.com https://drive.google.com; img-src 'self' data: https:" always;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    location = /index.html {
        add_header Cache-Control "no-store" always;
        try_files $uri =404;
    }

    location ~* \.(?:js|css|woff2?|png|jpg|jpeg|gif|svg|ico)$ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    location / {
        add_header Cache-Control "no-store" always;
        try_files $uri $uri/ /index.html;
    }

    # Snapshot publication is an intentionally heavier admin operation. Its
    # external delivery calls are tightly bounded by the backend, while this
    # explicit budget prevents Nginx's 60s default from expiring before the
    # backend/Gunicorn request budgets and returning an ambiguous HTML 504.
    location = /api/admin/landing-examples/publish {
        proxy_pass ${BACKEND_URL};
        proxy_http_version 1.1;
        proxy_set_header Host $proxy_host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 200s;
        proxy_intercept_errors on;
        error_page 502 503 = @landing_publish_gateway_error;
        error_page 504 = @landing_publish_timeout;
    }

    location @landing_publish_gateway_error {
        default_type application/json;
        add_header Cache-Control "no-store" always;
        return 503 '{"error":"The publishing service is temporarily unavailable. Refresh before retrying."}';
    }

    location @landing_publish_timeout {
        default_type application/json;
        add_header Cache-Control "no-store" always;
        return 504 '{"error":"Publishing took too long at the gateway. The snapshot may still have been saved; refresh before retrying."}';
    }

    location /api/ {
        proxy_pass ${BACKEND_URL};
        proxy_http_version 1.1;
        proxy_set_header Host $proxy_host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Connection "";
        proxy_buffering off;
    }

    # Health check
    location /health {
        access_log off;
        return 200 'healthy';
    }
}
