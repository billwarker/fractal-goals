<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=2" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Fractal Goals - One App for Goals, Programs & Training</title>

  <!--
    Static, crawler-visible SEO and social tags. Link unfurlers (Twitter,
    Slack, Discord, iMessage) and search crawlers read the served HTML, not the
    runtime meta that src/pages/Landing.jsx injects for in-app navigation — so
    these must live here in the shell. Keep the copy in sync with the SEO block
    in src/content/landing.md.
  -->
  <meta name="description" content="Break big goals into trackable trees, build your own programs, and log every session in one composable platform. Built for people training across many disciplines." />
  <link rel="canonical" href="https://fractalgoals.com/" />

  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="Fractal Goals" />
  <meta property="og:url" content="https://fractalgoals.com/" />
  <meta property="og:title" content="Track every goal, program, and training session in one place" />
  <meta property="og:description" content="Break big goals into trackable trees, build your own programs, and log every session in one composable platform. Built for people training across many disciplines." />
  <meta property="og:image" content="https://fractalgoals.com/og-cover.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />

  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Track every goal, program, and training session in one place" />
  <meta name="twitter:description" content="Break big goals into trackable trees, build your own programs, and log every session in one composable platform. Built for people training across many disciplines." />
  <meta name="twitter:image" content="https://fractalgoals.com/og-cover.png" />
  <!-- Typography: DM Sans (UI body), DM Serif Display (display headings), JetBrains Mono (code/metrics) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preload" as="style" onload="this.onload=null;this.rel='stylesheet'" href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=DM+Serif+Display:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap" />
  <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=DM+Serif+Display:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap" /></noscript>
  <script>
    // Start fetching public landing examples while the JS bundle is still
    // downloading; src/utils/landingPrefetch.js consumes this promise.
    // Entry-path logic mirrors isLandingEntryPath/isPublicMarketingHost in
    // src/utils/landingPrefetch.js and src/utils/marketingHost.js — keep in sync.
    (function () {
      var host = window.location.hostname;
      var path = window.location.pathname;
      var isMarketingHost = host === 'fractalgoals.com' || host === 'www.fractalgoals.com';
      var isLocalDevHost = host === 'localhost' || host === '127.0.0.1' || host === '0.0.0.0' || host === '::1';
      var isLocalPreviewPath = path === '/landing-preview' && isLocalDevHost;
      if (!isLocalPreviewPath && !(path === '/' && isMarketingHost)) return;
      var staticUrl = '%VITE_LANDING_EXAMPLES_STATIC_URL%';
      if (!staticUrl || staticUrl.charAt(0) === '%') staticUrl = '';
      window.__fgLandingExamplesStaticUrl = staticUrl;
      var preloadUrl = staticUrl || '/api/public/landing-examples';
      window.__fgLandingExamplesPreload = fetch(preloadUrl, { credentials: staticUrl ? 'omit' : 'same-origin' })
        .then(function (response) {
          if (!response.ok) throw new Error('landing examples preload failed: ' + response.status);
          return response.json();
        });
      // landingPrefetch falls back to its own request on rejection.
      window.__fgLandingExamplesPreload.catch(function () {});
    })();
  </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
